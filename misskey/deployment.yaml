apiVersion: apps/v1
kind: Deployment
metadata:
  name: misskey-web
  namespace: misskey
  labels:
    app: misskey-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: misskey-web
  template:
    metadata:
      labels:
        app: misskey-web
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: misskey-web
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: misskey-web
          image: misskey/misskey:2025.5.1@sha256:4d8dd9840a0696415802384668e6102745a3b3967152a89b918977ac66a0b645
          volumeMounts:
            - name: misskey-default-config-file
              mountPath: /misskey/.config
              readOnly: true
          ports:
            - containerPort: 3000
      volumes:
        - name: misskey-default-config-file
          secret:
            secretName: misskey-default-config
